syntax = "proto3";

package hyperion.v1;

option go_package = "github.com/andrearcaina/hyperion/proto;hyperionv1";

service Hyperion {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Join(JoinRequest) returns (JoinResponse);
}

message Entry {
  string key = 1;
  bytes value = 2;
}

message PutRequest {
  string key = 1;
  bytes value = 2;
}

message PutResponse {
  Entry entry = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  Entry entry = 1;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {}

message ListRequest {}

message ListResponse {
  repeated Entry entries = 1;
}

message JoinRequest {
  string node_id = 1;
  string raft_address = 2;
}

message JoinResponse {}
